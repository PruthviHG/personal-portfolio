<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 CINEMATIC</title>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    
    <style>
        body { margin: 0; background: #040508; overflow: hidden; touch-action: none; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        
        /* CINEMATIC CURTAIN TO BYPASS BROWSER AUDIO BLOCK */
        #intro-curtain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #000000; z-index: 9999; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-icon {
            width: 50px; height: 50px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            transition: all 0.3s ease; animation: pulse 2s infinite;
        }
        .play-icon svg { width: 15px; height: 15px; fill: #fff; margin-left: 4px; opacity: 0.7; }
        .play-icon:hover { border-color: #4781D7; transform: scale(1.1); box-shadow: 0 0 30px rgba(71, 129, 215, 0.5); }
        .play-icon:hover svg { fill: #4781D7; opacity: 1; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body>

    <div id="intro-curtain">
        <div class="play-icon">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
    </div>

    <div id="canvas-container"></div>
    
    <audio id="main-audio" loop src="https://raw.githubusercontent.com/PruthviHG/personal-portfolio/832c60613f2506307e3c975fda0e8d9cf6119a28/music/Redline%20Heart.mp3" crossorigin="anonymous" style="display:none;"></audio>

    <script>
        // ==========================================
        // --- AUDIO & CINEMATIC START LOGIC ---
        // ==========================================
        let audioContext, analyser, dataArray, isAudioInitialized = false, currentBassPulse = 0;
        const audioPlayer = document.getElementById('main-audio');
        let hasStarted = false;

        document.getElementById('intro-curtain').addEventListener('click', function() {
            // Fade out curtain
            this.style.opacity = '0';
            setTimeout(() => this.style.display = 'none', 1500);

            // Start Audio
            audioPlayer.volume = 1.0;
            audioPlayer.play().then(() => {
                if (!isAudioInitialized) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser(); 
                    analyser.fftSize = 128; 
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    const source = audioContext.createMediaElementSource(audioPlayer);
                    source.connect(analyser); 
                    analyser.connect(audioContext.destination); 
                    isAudioInitialized = true;
                }
                if(audioContext.state === 'suspended') audioContext.resume();
            }).catch(e => console.warn(e));

            hasStarted = true;
        });

        // ==========================================
        // --- OPTIMIZED 3D ENGINE ---
        // ==========================================
        let scene, camera, renderer, controls, carModel;
        let neonLights = [], overheadLights = [];
        
        // Cinematic Camera Targets
        const startCameraPos = new THREE.Vector3(2, 0.5, 4); // Close up on front wing/tire
        const targetCameraPos = new THREE.Vector3(7, 3.5, 8); // Final wide shot

        function init3D() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x040508);
            scene.fog = new THREE.FogExp2(0x040508, 0.025);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.copy(startCameraPos); // Start zoomed in

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
            
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.03;
            controls.autoRotate = true; controls.autoRotateSpeed = 0.4; 
            controls.maxPolarAngle = Math.PI / 2 - 0.02; 
            controls.minDistance = 2.5; controls.maxDistance = 14;
            controls.target.set(0, 0.5, 0);

            buildCinematicGarage();
            loadImportedModel(); 

            window.addEventListener('resize', onWindowResize);
        }

        function buildCinematicGarage() {
            const floorGeo = new THREE.PlaneGeometry(50, 50); 
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x0a0c12, roughness: 0.15, metalness: 0.6 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

            const gridHelper = new THREE.GridHelper(40, 80, 0x4781D7, 0x111520);
            gridHelper.position.y = 0.01; gridHelper.material.opacity = 0.1; gridHelper.material.transparent = true;
            scene.add(gridHelper);

            scene.add(new THREE.AmbientLight(0x1a2639, 0.6));
            
            const mainLight = new THREE.SpotLight(0xffffff, 4);
            mainLight.position.set(0, 8, 0); mainLight.angle = Math.PI / 3; mainLight.penumbra = 0.5; 
            mainLight.castShadow = true; mainLight.shadow.mapSize.width = 1024; mainLight.shadow.mapSize.height = 1024; 
            mainLight.shadow.bias = -0.0005; scene.add(mainLight);

            const rimLight = new THREE.PointLight(0x4781D7, 2, 15);
            rimLight.position.set(4, 2, -5); scene.add(rimLight);

            // Blue Audio Reactive Neons
            const neonMat = new THREE.MeshStandardMaterial({ color: 0x4781D7, emissive: 0x4781D7, emissiveIntensity: 1 });
            const neonStrip = new THREE.Mesh(new THREE.BoxGeometry(20, 0.1, 0.1), neonMat);
            neonStrip.position.set(0, 4, -12); scene.add(neonStrip); neonLights.push(neonMat);
            
            const pLight = new THREE.PointLight(0x4781D7, 2, 20); 
            pLight.position.set(0, 4, -11); scene.add(pLight); overheadLights.push(pLight);
        }

        // ==========================================
        // --- SMART MODEL LOADER & COLOR PARSER ---
        // ==========================================
        function loadImportedModel() {
            const loader = new THREE.OBJLoader();
            
            // 1. CUSTOM COLOR: Deep Blue Metallic (#4781D7)
            const carPaint = new THREE.MeshPhysicalMaterial({ 
                color: 0x4781D7, metalness: 0.8, roughness: 0.2, clearcoat: 1.0, clearcoatRoughness: 0.05
            });

            // 2. CUSTOM COLOR: Pure Black Rubber (#000000)
            const rubberMat = new THREE.MeshStandardMaterial({ 
                color: 0x000000, metalness: 0.05, roughness: 0.95 
            });

            // 3. Dark Carbon Fiber for aero
            const carbonMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, metalness: 0.6, roughness: 0.8 
            });

            const githubRawUrl = 'https://raw.githubusercontent.com/PruthviHG/personal-portfolio/832c60613f2506307e3c975fda0e8d9cf6119a28/models/f1_mesh.obj';

            loader.load(githubRawUrl, 
                function (obj) {
                    const box = new THREE.Box3().setFromObject(obj);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const scale = 4.8 / Math.max(size.x, size.y, size.z); 
                    
                    obj.scale.set(scale, scale, scale);
                    obj.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);

                    obj.traverse(function (child) {
                        if (child.isMesh) {
                            child.castShadow = true; child.receiveShadow = true;
                            const name = child.name.toLowerCase();
                            
                            if (name.includes('tire') || name.includes('wheel') || name.includes('rubber') || name.includes('rim')) {
                                child.material = rubberMat;
                            } else if (name.includes('wing') || name.includes('carbon') || name.includes('floor')) {
                                child.material = carbonMat;
                            } else {
                                child.geometry.computeBoundingBox();
                                const meshY = child.geometry.boundingBox.min.y * scale;
                                child.material = (meshY < 0.25 && !name) ? carbonMat : carPaint;
                            }
                        }
                    });
                    
                    if (carModel) scene.remove(carModel);
                    carModel = obj;
                    scene.add(carModel);
                }, 
                undefined,
                function () {
                    createFallbackChassis();
                }
            );
        }

        function createFallbackChassis() {
            carModel = new THREE.Group();
            const mat = new THREE.MeshPhysicalMaterial({ color: 0x4781D7, metalness: 0.8, roughness: 0.2, clearcoat: 1.0 });
            const rubber = new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 0.1, roughness: 0.95 });
            
            const tub = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 2.2, 16).rotateX(Math.PI/2), mat);
            tub.position.set(0, 0.35, -0.2); tub.castShadow = true; carModel.add(tub);
            
            const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.36, 0.4, 32).rotateZ(Math.PI/2), rubber);
            tire.position.set(1, 0.36, 1.3); tire.castShadow = true; carModel.add(tire);
            
            scene.add(carModel);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==========================================
        // --- OPTIMIZED RENDER LOOP ---
        // ==========================================
        let frameCount = 0;

        function animate() {
            requestAnimationFrame(animate); 
            
            // Cinematic Camera Swoop on Start
            if (hasStarted) {
                camera.position.lerp(targetCameraPos, 0.015);
            }
            controls.update();
            
            frameCount++;
            if (isAudioInitialized && !audioPlayer.paused && frameCount % 2 === 0) {
                analyser.getByteFrequencyData(dataArray);
                let bassSum = 0; 
                for(let i = 0; i < 3; i++) bassSum += dataArray[i]; 
                currentBassPulse = (bassSum / 3) / 255; 
                
                const intensity = 1 + (currentBassPulse * 4);
                neonLights.forEach(mat => mat.emissiveIntensity = intensity);
                overheadLights.forEach(light => light.intensity = intensity + 1);
            } else if (!isAudioInitialized || audioPlayer.paused) {
                const idlePulse = Math.sin(Date.now() * 0.002) * 0.3 + 1.2;
                neonLights.forEach(mat => mat.emissiveIntensity = idlePulse);
                overheadLights.forEach(light => light.intensity = idlePulse + 1);
            }
            
            renderer.render(scene, camera);
        }

        init3D(); animate();
    </script>
</body>
</html>
